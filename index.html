<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRGxXcalius | BGMI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #020617;
  color: #e2e8f0;
  overflow-x: hidden;
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
header {
  text-align: center;
  padding: 3rem 1rem;
}

header h1 {
  font-family: 'Orbitron';
  color: #22c55e;
  text-shadow: 0 0 15px #22c55e;
}

nav a {
  margin: 0 10px;
  color: #94a3b8;
  text-decoration: none;
}

nav a:hover {
  color: #22c55e;
}

/* SECTION */
section {
  max-width: 900px;
  margin: auto;
  padding: 2rem 1rem;
}

h2 {
  color: #22c55e;
  margin-bottom: 1rem;
  font-family: 'Orbitron';
}

/* GLASS CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 1.2rem;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 1rem;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(34,197,94,0.4);
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  text-align: center;
}

.stat h3 {
  font-size: 1.5rem;
  color: #22c55e;
}

.stat p {
  font-size: 0.8rem;
  color: #94a3b8;
}

/* SKILLS */
.skills span {
  display: inline-block;
  margin: 5px;
  padding: 6px 12px;
  background: rgba(34,197,94,0.15);
  border-radius: 8px;
}

/* VIDEO */
iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 1rem;
  color: #64748b;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h1>TRGxXcalius</h1>
  <p>Trogon ESports • Assaulter</p>

  <nav>
    <a href="#stats">Stats</a>
    <a href="#skills">Skills</a>
    <a href="#highlights">Highlights</a>
  </nav>
</header>

<section id="stats">
  <h2>Player Stats</h2>
  <div class="card stats">
    <div class="stat">
      <h3 id="kd">0</h3>
      <p>KD</p>
    </div>
    <div class="stat">
      <h3 id="wins">0</h3>
      <p>Wins</p>
    </div>
    <div class="stat">
      <h3 id="matches">0</h3>
      <p>Matches</p>
    </div>
  </div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div class="card skills">
    <span>Rush Gameplay</span>
    <span>Clutch Master</span>
    <span>Close Combat</span>
    <span>Team Fight</span>
  </div>
</section>

<section id="highlights">
  <h2>Highlights</h2>
  <div class="card">
    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe>
  </div>
</section>

<footer>
  <p>© 2026 TRGxXcalius</p>
</footer>

<script>
/* COUNTER */
function animate(id, end) {
  let start = 0;
  let interval = setInterval(() => {
    start++;
    document.getElementById(id).innerText = start;
    if (start >= end) clearInterval(interval);
  }, 20);
}

animate("kd", 7);
animate("wins", 87);
animate("matches", 217);

/* PARTICLES */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#22c55e";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });

  update();
}

function update() {
  particles.forEach(p => {
    p.y += p.d;
    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 30);
</script>

</body>
</html>
